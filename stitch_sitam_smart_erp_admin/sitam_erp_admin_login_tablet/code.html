<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "on-tertiary-container": "#ffede6",
                    "secondary-fixed": "#d3e4fe",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",

                    "surface-container-highest": "#e0e3e5",

                    "surface-container-lowest": "#ffffff",

                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "on-tertiary-fixed-variant": "#7d2d00",

                    "on-secondary-fixed": "#0b1c30",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Subtle atmospheric background effect */
        .login-mesh {
            background-color: #f7f9fb;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 74, 198, 0.03) 0px, transparent 50%);
        }

        /* Glassmorphism subtle lift */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
        }
        
        /* Animation for login feedback */
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
        .ripple-effect {
            position: relative;
            overflow: hidden;
        }
        .ripple-effect:after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }
        .ripple-effect:focus:not(:active):after {
            animation: ripple 1s ease-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md text-body-md min-h-screen flex flex-col login-mesh selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Content Area (Centered Card) -->
<main class="flex-grow flex items-center justify-center px-margin py-xl">
<div class="w-full max-w-[480px] space-y-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Branding Section -->
<header class="flex flex-col items-center gap-sm">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div class="text-center mt-md">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">SITAM ERP</h1>
<p class="text-secondary font-title-sm">Smart Enterprise Resource Planning</p>
</div>
</header>
<!-- Login Card -->
<section class="glass-card border border-outline-variant rounded-xl p-xl shadow-sm">
<div class="mb-xl">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Admin Sign In</h2>
<p class="text-secondary font-body-sm">Access the administrative dashboard and management tools.</p>
</div>
<form action="#" class="space-y-lg" id="loginForm" method="POST">
<!-- Email Address -->
<div class="space-y-xs">
<label class="block text-on-surface-variant font-label-caps text-label-caps" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[48px] pl-[48px] pr-md bg-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none" id="email" name="email" placeholder="admin@sitam.edu.in" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block text-on-surface-variant font-label-caps text-label-caps" for="password">Password</label>
<a class="text-primary font-label-caps text-label-caps hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[48px] pl-[48px] pr-[48px] bg-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container" id="remember" name="remember" type="checkbox"/>
<label class="text-secondary font-body-sm cursor-pointer select-none" for="remember">Stay signed in for 30 days</label>
</div>
<!-- Sign In Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-title-sm rounded-xl ripple-effect shadow-md shadow-primary/10 hover:bg-primary transition-all active:scale-[0.98] flex items-center justify-center gap-sm" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Social/External Links (Subtle) -->
<div class="mt-xl pt-xl border-t border-outline-variant/50">
<p class="text-center text-outline font-body-sm">
                        Need assistance? <a class="text-primary font-semibold hover:underline" href="#">Contact IT Support</a>
</p>
</div>
</section>
</div>
</main>
<!-- Footer: System Status & Date -->
<footer class="p-lg flex flex-col sm:flex-row justify-between items-center gap-md border-t border-outline-variant/30 bg-surface-container-lowest/50">
<div class="flex items-center gap-md">
<div class="flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
<span class="text-on-surface-variant font-mono-label text-mono-label uppercase tracking-widest">System Operational</span>
</div>
<span class="h-4 w-[1px] bg-outline-variant hidden sm:block"></span>
<span class="text-secondary font-mono-label text-mono-label" id="systemVersion">v2.4.1-STABLE</span>
</div>
<div class="flex items-center gap-md">
<div class="flex items-center gap-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
<span class="font-mono-label text-mono-label" id="currentDate">-- --- ----</span>
</div>
<span class="h-4 w-[1px] bg-outline-variant hidden sm:block"></span>
<div class="flex items-center gap-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span class="font-mono-label text-mono-label" id="currentTime">00:00:00</span>
</div>
</div>
</footer>
<script>
        // Password Visibility Toggle
        function togglePassword() {
            const passInput = document.getElementById('password');
            const passIcon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                passIcon.innerText = 'visibility';
            }
        }

        // Live Clock and Date
        function updateDateTime() {
            const now = new Date();
            
            // Format: DD MMM YYYY
            const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
            document.getElementById('currentDate').innerText = now.toLocaleDateString('en-GB', dateOptions).toUpperCase();
            
            // Format: HH:MM:SS
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Form Submit Micro-interaction
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Authenticating...</span>`;
            
            // Simulating a brief delay for UI demonstration
            setTimeout(() => {
                // In a real app, redirection or error handling would happen here
                alert('Authentication successful! Redirecting to dashboard...');
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }, 1500);
        });

        // Interactive focus tracking for input icons (already handled via tailwind group-focus)
    </script>
</body></html>
