name: "Sitam ERP — DevSecOps Supply Chain Security Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  devsecops-audit:
    name: "Static Analysis & Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # 1. Audit npm dependencies for known vulnerabilities
      - name: Security Vulnerability Scan (npm audit)
        run: |
          cd backend
          npm audit --audit-level=high

      # 2. Secret Scanning (prevent credentials leakage)
      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: "HEAD"
          extra_args: --only-verified

      # 3. SBOM (Software Bill of Materials) Generation
      - name: Generate CycloneDX SBOM
        uses: CycloneDX/gh-node-module-sbom-action@v1
        with:
          rs-directory-path: './backend'
          output-format: 'json'
          output-file: 'sbom.json'

      - name: Archive SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sitam-sbom
          path: sbom.json

  container-scan:
    name: "Trivy Container Security Vulnerabilities Scanning"
    runs-on: ubuntu-latest
    needs: devsecops-audit
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Local Mock Container Image
        run: |
          docker build -t sitam/backend:latest ./backend

      - name: Run Trivy vulnerability scanner on Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sitam/backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
