name: SITAM Smart ERP CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20
        node-version: 20
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm ci || npm install

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci || npm install

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Prisma Database (SQLite default for CI)
      run: |
        cd backend
        npx prisma generate

    - name: Build Frontend Configuration (Dynamic Test)
      run: |
        export API_BASE_URL="https://sitam-test-api.up.railway.app/api"
        node scripts/generate-config.js

    - name: Verify Backend Compilation
      run: |
        cd backend
        node -c server.js
        node -c worker.js

    - name: Sync Capacitor Android Assets
      run: |
        npx cap sync android

    - name: Build Android App (Assemble Debug APK)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
