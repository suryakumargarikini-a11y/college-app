global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'sre-remediation-webhook'
  routes:
    - match_re:
        severity: 'CRITICAL|EMERGENCY'
      receiver: 'sre-remediation-webhook'
      continue: true
    - match:
        severity: 'WARNING'
      receiver: 'slack-notifications'

inhibit_rules:
  - source_match:
      severity: 'CRITICAL'
    target_match:
      severity: 'WARNING'
    equal: ['alertname', 'cluster', 'service']

receivers:
  - name: 'sre-remediation-webhook'
    webhook_configs:
      - url: 'http://app:3001/api/sre/remedy/webhook'
        send_resolved: true
        http_config:
          headers:
            "x-sre-role": "operator"

  - name: 'slack-notifications'
    slack_configs:
      - channel: '#sre-alerts'
        api_url: 'https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX'
        send_resolved: true

  - name: 'email-alerts'
    email_configs:
      - to: 'sre-team@sitam-erp.co.in'
        from: 'alertmanager@sitam-erp.co.in'
        smarthost: 'smtp.sitam-erp.co.in:587'
        auth_username: 'alertmanager'
        auth_password: 'smtp-password'
