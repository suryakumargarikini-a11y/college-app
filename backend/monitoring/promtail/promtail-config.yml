server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sitam-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: sitam-erp
          __path__: /var/log/sitam-app/*.log
    
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            service: service
            environment: environment
            requestId: requestId
            traceId: traceId
            correlationId: correlationId
            tag: tag
            jobId: jobId
            workerId: workerId
      
      # Expose key fields as Loki labels for quick filtering
      - labels:
          level:
          service:
          environment:
          tag:
          workerId:
          jobId:

  - job_name: docker-container-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - target_label: 'job'
        replacement: 'docker-containers'
