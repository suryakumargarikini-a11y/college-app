global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: 'sitam-erp-backend'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:3001', 'app:3001']
