[phases.setup]
nixPkgs = ["...", "chromium"]

[phases.build]
cmds = [
  "echo '=== Chromium Discovery ==='",
  "which chromium || true",
  "which chromium-browser || true",
  "which google-chrome || true",
  "find / -name chromium 2>/dev/null | head -50",
  "find / -name chrome 2>/dev/null | head -50"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
