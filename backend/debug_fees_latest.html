<script language="javascript" type="text/javascript">
var _hdn;
function _onBodyLoad()
{
    _hdn=$("[id$=hdnType]");
    if ($(_hdn).val() == "")
        $("#trRollNo").show();
    else
        _showReport();
}
function _onSearchClick()
{
    $("#txtRollNo").val('');
    $("#btnShow").attr("disabled",false);
    $("#divReport").html('');
    ShowSearchPage("txtRollNo");
}
function _showReport()
{
    var _rollno = $(_hdn).val();
    if(_rollno=="")
    {
        if(!checkEmpty("txtRollNo",'roll number'))
            return false;
        _rollno=$("#txtRollNo").val();    
    }    
    var _result=Feepayments_studentpayments.ShowPaymentsReport(_rollno);
    if(_result.error==null)
       $("#divReport").html(_result.value);
    else
        Raiserror(_result.error);    
    ResizeIFrame();    
}
</script>
